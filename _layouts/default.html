<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/logo.svg' | relative_url }}">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
 
<div id="preloader"><div id="preloader-text">DOPPIE — MMXXVI</div></div>
<div id="progress"></div>
 
{% include nav.html %}
 
<main>
    {{ content }}
</main>
 
{% include footer.html %}
 
<script>
// Netlify Identity — redirect to /admin/ after login or invite accept
if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', user => {
        if (!user) {
            window.netlifyIdentity.on('login', () => {
                document.location.href = '/admin/';
            });
        }
    });
}
 
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => document.body.classList.add('loaded'), 1400);
});
 
function updateClock() {
    const now = new Date();
    const opts = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Europe/Rome' };
    const el = document.getElementById('clock');
    if (el) el.textContent = now.toLocaleTimeString('it-IT', opts);
}
updateClock();
setInterval(updateClock, 30000);
 
window.addEventListener('scroll', () => {
    const scrolled = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
    const bar = document.getElementById('progress');
    if (bar) bar.style.width = scrolled + '%';
}, { passive: true });
 
const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if (e.isIntersecting) {
            e.target.querySelectorAll('.ln').forEach((ln, i) => {
                setTimeout(() => ln.style.transform = 'translateY(0)', i * 80);
            });
            obs.unobserve(e.target);
        }
    });
}, { threshold: 0.15 });
 
document.querySelectorAll('section').forEach(s => obs.observe(s));
</script>
 
</body>
</html>
