backend:
  name: git-gateway
  branch: main # Make sure this matches your GitHub branch (usually main or master)

media_folder: "images" # Where uploaded photos are saved
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pagine Sito"
    files:
      - label: "Modifica Homepage & Chi Siamo"
        name: "home"
        file: "index.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Titolo Principale (Hero)", name: "hero_title", widget: "string"}
          - {label: "Sottotitolo (Hero)", name: "hero_subtitle", widget: "string"}
          - {label: "Titolo Sezione Chi Siamo", name: "about_title", widget: "string"}
          - {label: "Testo Chi Siamo", name: "about_text", widget: "text"}
